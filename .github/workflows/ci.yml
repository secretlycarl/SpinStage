name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify webui JS imports
        run: python3 scripts/verify_webui_js.py

      - name: Verify version consistency
        run: python3 scripts/verify_version.py

      - name: Pre-push checks
        run: python3 scripts/pre_push_check.py

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Sync drift check
        run: |
          python3 scripts/sync_public_platforms.py
          git diff --exit-code -- spinstage-webui spinstage-android/www spinstage-android/android/app/src/main/assets/public spinstage-webos

  android:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android dependencies
        run: npm ci
        working-directory: spinstage-android

      - name: Build debug APK
        run: npm run build:debug
        working-directory: spinstage-android
